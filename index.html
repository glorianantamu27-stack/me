<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAD FINALS SHIFT2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="logo">
        <img src="logo1.png" alt="logo unavaliable">
    </header>

    <section class="features">
        <div class="image">
            <img src="image1.avif" alt="no image available">
        </div> 
        <div class="image">
            <div class="text">
              <h1>Explore</h1>
              <p>Welcome to travel and explore, your ultimate guide to exploring the globe</p>
              <button 
              id="book" 
              >Download App</button>
              <button commandfor="planForm" command="show-modal">book now</button>  
            </div>
        </div> 
        <div class="image">
            <img src="image2.avif" alt="no image available">
        </div>
    </section>
  <dialog id="planForm">
      <section class="features2">
         <h6>PLAN YOUR TRIP</h6>
         <h3>Make your booking early!</h3>
         <div class="message" style="display:none;"></div>
           <form class="form">
             <label for="name"></label>
             <input type="text" class="name" placeholder="Name......">
             <label for="email"></label>
             <input type="email" class="email" placeholder="Email......">
             <label for="toursite"></label>
             <input type="text" class="tour" placeholder="Tourist Site......">
             <button type="submit">Book Now</button>
             <button onclick="document.getElementById('planForm').close()">❎</button>
         </form>
      </section>
  </dialog>
    <footer class="footer">
        <h3>Experience more together</h3>
        <p>Business Computing-WAD Exam</p>
    </footer>
</body>

</html>
